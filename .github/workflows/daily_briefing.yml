- name: 生成結果を確認してコミット
        run: |
          echo "=== feed.jsonの内容 ==="
          cat docs/feed.json
          echo "======================"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.json
          git status
          git commit -m "chore: $(date '+%Y-%m-%d') ブリーフィング更新" || echo "変更なし"
          git push || echo "プッシュ不要"
